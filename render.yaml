services:
  - type: web
    name: inkgraph-backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://ink-graph.vercel.app","https://inkgraph-frontend.vercel.app","http://localhost:5173"]'
      - key: ALLOWED_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: MAX_CONCURRENT_RUNS
        value: "20"
      - key: PYTHON_VERSION
        value: "3.11.0"
